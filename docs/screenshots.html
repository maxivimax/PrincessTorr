<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PrincessTorr - Screenshots</title>
    <style>
      :root {
        --bg: #0a0b0d;
        --fg: #d6d9dd;
        --dim: #8a929b;
        --green: #7ee787;
        --cyan: #56d4dd;
        --line: #20242a;
        --card: #111317;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; background: var(--bg); }
      body {
        color: var(--fg);
        font: 15px/1.65 ui-monospace, "SF Mono", "JetBrains Mono", Menlo,
          Consolas, monospace;
        padding: 48px 20px 80px;
      }
      main { max-width: 960px; margin: 0 auto; }
      h1 { font-size: 26px; margin: 0 0 4px; letter-spacing: 1px; }
      h1 .p { color: var(--green); }
      .nav { color: var(--dim); margin: 0 0 28px; }
      a { color: var(--green); text-decoration: none; border-bottom: 1px dotted var(--line); }
      a:hover { border-bottom-color: var(--green); }
      figure { margin: 0 0 34px; }
      figcaption { color: var(--cyan); margin: 0 0 10px; }
      figcaption::before { content: "// "; color: var(--dim); }
      img {
        display: block; width: 100%; height: auto;
        border: 1px solid var(--line); border-radius: 10px; background: var(--card);
      }
    </style>
  </head>
  <body>
    <main>
      <h1><span class="p">Princess</span>Torr — screenshots</h1>
      <p class="nav">
        <a href="./">← Home</a> ·
        <a href="https://github.com/maxivimax/PrincessTorr">GitHub</a>
      </p>

      <figure>
        <figcaption>Main menu</figcaption>
        <img src="screenshots/1.%20mainpage.webp" alt="Main menu" loading="lazy" />
      </figure>
      <figure>
        <figcaption>Movies section</figcaption>
        <img src="screenshots/2.%20movies%20page.webp" alt="Movies section" loading="lazy" />
      </figure>
      <figure>
        <figcaption>Continue watching</figcaption>
        <img src="screenshots/3.%20continue%20watch.webp" alt="Continue watching" loading="lazy" />
      </figure>
      <figure>
        <figcaption>Catalog — poster and synopsis</figcaption>
        <img src="screenshots/4.%20movie%20info.webp" alt="Movie info" loading="lazy" />
      </figure>
      <figure>
        <figcaption>Seasons</figcaption>
        <img src="screenshots/5.%20seasons.webp" alt="Seasons" loading="lazy" />
      </figure>
      <figure>
        <figcaption>Episodes (with air status)</figcaption>
        <img src="screenshots/6.%20episodes.webp" alt="Episodes" loading="lazy" />
      </figure>
      <figure>
        <figcaption>Release list with filters</figcaption>
        <img src="screenshots/7.%20torrents.webp" alt="Release list" loading="lazy" />
      </figure>
      <figure>
        <figcaption>Settings</figcaption>
        <img src="screenshots/8.1.%20settings.webp" alt="Settings 1" loading="lazy" />
        <img src="screenshots/8.2.%20settings.webp" alt="Settings 2" loading="lazy" style="margin-top:14px" />
        <img src="screenshots/8.3.%20settings.webp" alt="Settings 3" loading="lazy" style="margin-top:14px" />
        <img src="screenshots/8.4.%20settings.webp" alt="Settings 4" loading="lazy" style="margin-top:14px" />
        <img src="screenshots/8.5.%20settings.webp" alt="Settings 5" loading="lazy" style="margin-top:14px" />
      </figure>
      <figure>
        <figcaption>Search</figcaption>
        <img src="screenshots/9.%20search.webp" alt="Search" loading="lazy" />
      </figure>
    </main>
  </body>
</html>
